<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas-HITL | Precision Dimension Extraction</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #22d3ee;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo { font-family: 'Outfit'; font-weight: 700; font-size: 1.5rem; color: var(--accent); }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn:hover { background: #334155; border-color: var(--primary); }
        .btn-primary { background: var(--primary); border: none; }
        .btn-primary:active { transform: scale(0.95); }

        #zoom-val { min-width: 50px; text-align: center; font-variant-numeric: tabular-nums; }

        /* ──────────────────── LAYOUT ──────────────────── */
        main { flex: 1; display: flex; overflow: hidden; }

        #sidebar {
            width: 180px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1rem 0;
        }

        .page-item {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .page-item:hover { background: rgba(255,255,255,0.05); }
        .page-item.active { border-color: var(--accent); background: rgba(34, 211, 238, 0.1); opacity: 1; font-weight: 600; }

        /* ──── Workspace (Drawing Area) ──── */
        #workspace {
            flex: 1;
            overflow: auto;
            padding: 40px;
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        #canvas-wrapper {
            position: relative;
            transform-origin: top left;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: white;
        }

        canvas { position: absolute; top: 0; left: 0; }
        #pdf-canvas { z-index: 1; pointer-events: none; }
        #overlay-canvas { z-index: 2; cursor: crosshair; }

        /* ──── Right Panel (Results) ──── */
        #panel-right {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            font-family: 'Outfit';
        }
        #results { flex: 1; overflow-y: auto; padding: 1rem; }
        .res-card {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }
        .res-type { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px;}
        .res-val { color: white; font-weight: 600; font-size: 1.1rem; }

        /* ──────────────────── MODAL ──────────────────── */
        #upload-modal {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .drop-zone {
            width: 400px; padding: 40px; border: 2px dashed var(--border); border-radius: 1rem;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .drop-zone:hover { border-color: var(--accent); background: rgba(34, 211, 238, 0.05); }

    </style>
</head>
<body>

<header>
    <div class="logo">ATLAS-HITL</div>
    <div class="toolbar">
        <button class="btn" id="btn-zoom-out">−</button>
        <span id="zoom-val">100%</span>
        <button class="btn" id="btn-zoom-in">+</button>
        <div style="width: 20px;"></div>
        <button class="btn" id="btn-clear">Clear</button>
        <button class="btn btn-primary" id="btn-analyze">Process Page</button>
        <button class="btn" id="btn-export" style="border-color: #10b981; color: #10b981;">Export XLSX</button>
    </div>
</header>

<main>
    <div id="sidebar"></div>
    <div id="workspace">
        <div id="canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
        </div>
    </div>
    <div id="panel-right">
        <div class="panel-header">EXTRACTED DATA</div>
        <div id="results"></div>
    </div>
</main>

<div id="upload-modal">
    <div class="drop-zone" id="drop-zone">
        <h2 style="margin-bottom: 10px;">Select Engineering PDF</h2>
        <p style="color: var(--accent);">Target specific dimensions with manual boxes</p>
    </div>
    <input type="file" id="file-input" hidden>
</div>

<script>
    const state = {
        pages: [],
        currentIdx: -1,
        zoom: 0.5, // Start at 50% to see whole page
        isDrawing: false,
        startX: 0, 
        startY: 0,
        boxes: [],
        currentBox: null,
        results: []
    };

    const wrapper = document.getElementById('canvas-wrapper');
    const pCanvas = document.getElementById('pdf-canvas');
    const oCanvas = document.getElementById('overlay-canvas');
    const pCtx = pCanvas.getContext('2d');
    const oCtx = oCanvas.getContext('2d');
    const resultsContainer = document.getElementById('results');

    // ──────────────────── ZOOM LOGIC ────────────────────

    function updateZoom() {
        wrapper.style.transform = `scale(${state.zoom})`;
        document.getElementById('zoom-val').innerText = `${Math.round(state.zoom * 100)}%`;
    }

    document.getElementById('btn-zoom-in').onclick = () => { state.zoom += 0.1; updateZoom(); };
    document.getElementById('btn-zoom-out').onclick = () => { state.zoom = Math.max(0.1, state.zoom - 0.1); updateZoom(); };

    // ──────────────────── UPLOAD ────────────────────

    const fileIn = document.getElementById('file-input');
    document.getElementById('drop-zone').onclick = () => fileIn.click();
    fileIn.onchange = ev => uploadFile(ev.target.files[0]);

    async function uploadFile(file) {
        if (!file) return;
        const fd = new FormData();
        fd.append('file', file);
        document.getElementById('upload-modal').innerHTML = "<h1>Rendering Drawing...</h1>";
        const resp = await fetch('/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        state.pages = data.pages;
        document.getElementById('upload-modal').style.display = 'none';
        initPageList();
        loadPage(0);
    }

    function initPageList() {
        const side = document.getElementById('sidebar');
        side.innerHTML = "";
        state.pages.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'page-item';
            div.id = `pg-${i}`;
            div.innerText = `Page ${i+1}`;
            div.onclick = () => loadPage(i);
            side.appendChild(div);
        });
    }

    function loadPage(idx) {
        state.currentIdx = idx;
        state.boxes = [];
        document.querySelectorAll('.page-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`pg-${idx}`).classList.add('active');

        const page = state.pages[idx];
        const img = new Image();
        img.src = `/get_page_image/${page.name}`;
        img.onload = () => {
            pCanvas.width = page.w; pCanvas.height = page.h;
            oCanvas.width = page.w; oCanvas.height = page.h;
            wrapper.style.width = page.w + 'px';
            wrapper.style.height = page.h + 'px';
            pCtx.drawImage(img, 0, 0);
            drawAll();
            // Auto-zoom to fit height if window is small
            const fit = (window.innerHeight - 150) / page.h;
            state.zoom = Math.min(1.0, fit);
            updateZoom();
        };
    }

    // ──────────────────── DRAWING CORE ────────────────────

    oCanvas.onmousedown = e => {
        state.isDrawing = true;
        const {x, y} = getMousePos(e);
        state.startX = x; state.startY = y;
    };

    window.onmousemove = e => {
        if (!state.isDrawing) return;
        const {x, y} = getMousePos(e);
        state.currentBox = {
            x: Math.min(state.startX, x),
            y: Math.min(state.startY, y),
            w: Math.abs(x - state.startX),
            h: Math.abs(y - state.startY)
        };
        drawAll();
    };

    window.onmouseup = () => {
        if (state.isDrawing && state.currentBox && state.currentBox.w > 4) {
            state.boxes.push(state.currentBox);
        }
        state.isDrawing = false;
        state.currentBox = null;
        drawAll();
    };

    function getMousePos(e) {
        const rect = oCanvas.getBoundingClientRect();
        // Here we must account for CSS scale!
        return {
            x: (e.clientX - rect.left) / state.zoom,
            y: (e.clientY - rect.top) / state.zoom
        };
    }

    function drawAll() {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        oCtx.lineWidth = 3;
        oCtx.strokeStyle = "#4f46e5";
        
        state.boxes.forEach((b, i) => {
            oCtx.strokeRect(b.x, b.y, b.w, b.h);
            oCtx.fillStyle = "rgba(79, 70, 230, 0.2)";
            oCtx.fillRect(b.x, b.y, b.w, b.h);
            oCtx.fillStyle = "white";
            oCtx.font = "bold 14px Inter";
            oCtx.fillText(`#${i+1}`, b.x + 5, b.y + 18);
        });

        if (state.currentBox) {
            oCtx.strokeStyle = "#22d3ee";
            oCtx.lineWidth = 2;
            oCtx.strokeRect(state.currentBox.x, state.currentBox.y, state.currentBox.w, state.currentBox.h);
        }
    }

    document.getElementById('btn-clear').onclick = () => { state.boxes = []; drawAll(); };

    // ──────────────────── BACKEND ANALYZE ────────────────────

    document.getElementById('btn-analyze').onclick = async () => {
        if (!state.boxes.length) return alert("Please draw some boxes.");
        const btn = document.getElementById('btn-analyze');
        btn.innerText = "Analyzing..."; btn.disabled = true;
        
        try {
            const resp = await fetch('/process_crop', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    filename: state.pages[state.currentIdx].name,
                    page_idx: state.currentIdx,
                    boxes: state.boxes
                })
            });
            const data = await resp.json();
            state.results.push(...data.results);
            renderResults();
            state.boxes = []; drawAll();
        } catch (err) { alert(err); }
        finally { btn.innerText = "Process Page"; btn.disabled = false; }
    };

    function renderResults() {
        resultsContainer.innerHTML = "";
        [...state.results].reverse().forEach(r => {
            const div = document.createElement('div');
            div.className = 'res-card';
            div.innerHTML = `
                <div class="res-type">PG ${r.page} | ${r.type}</div>
                <div class="res-val">${r.value}</div>
                <div style="font-size: 0.75rem; color: #64748b; margin-top: 5px;">"${r.raw_text}"</div>
            `;
            resultsContainer.appendChild(div);
        });
    }

    document.getElementById('btn-export').onclick = () => { window.location.href='/export'; };

    // Keyboard Undo
    window.onkeydown = e => {
        if (e.ctrlKey && e.key === 'z') { state.boxes.pop(); drawAll(); }
    };

</script>

</body>
</html>
